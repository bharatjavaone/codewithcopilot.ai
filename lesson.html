<head>

  <!-- Open Graph (updated dynamically by app.js) -->

  <!-- Twitter / X Card -->
  <meta name="twitter:card"        content="summary_large_image">
  <meta name="twitter:title"       id="tw-title"      content="Lesson — codewithcopilot.ai">
  <meta name="twitter:description" id="tw-description" content="Free GitHub Copilot lesson with video, objectives, and quiz.">
  <meta name="twitter:image"                          content="https://codewithcopilot.ai/og-image.png">

  <!-- Favicon -->
  <link rel="icon" href="favicon.svg" type="image/svg+xml">

  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link rel="stylesheet" href="css/style.css">

<body data-page="lesson">

  <!-- ── Header ─────────────────────────────────────────── -->
  <header class="site-header">
    <div class="header-inner">
      <a href="index.html" class="site-logo">
        <span class="logo-icon">🤖</span>
        <span>codewithcopilot.ai</span>
      </a>
      <nav class="site-nav">
        <a href="learn.html">🎓 Academy</a>
        <a href="index.html#tools">🛠 Tools</a>
        <a href="https://github.com" target="_blank" rel="noopener">GitHub</a>

    </div>
  </header>

  <!-- ── Lesson Layout ──────────────────────────────────── -->
  <div class="lesson-layout">

    <!-- Sidebar: all modules + progress — rendered by app.js -->
    <aside class="lesson-sidebar" id="lesson-sidebar">
      <div class="sidebar-header">
        <div class="sidebar-header-title">GitHub Copilot Academy</div>
        <div class="sidebar-progress-text" id="sidebar-progress-text">Loading…</div>
        <div class="sidebar-progress-bar">
          <div class="sidebar-progress-fill" id="sidebar-progress-fill" style="width:0%"></div>
        </div>
      </div>
      <nav class="sidebar-nav" id="sidebar-nav">
        <!-- Filled by app.js -->
      </nav>
    </aside>

    <!-- Main content area — rendered by app.js -->
    <main class="lesson-main" id="lesson-main">
      <div class="lesson-content">
        <p style="color:var(--text-muted); text-align:center; padding:80px 0;">Loading lesson…</p>
      </div>
    </main>

  </div>

  <!-- ── "Well Begun" Milestone Modal ──────────────────── -->
  <div class="milestone-modal-overlay hidden" id="milestone-modal-overlay"
       role="dialog" aria-modal="true" aria-labelledby="milestone-modal-title">
    <div class="milestone-modal">
      <div class="milestone-modal-emoji">🌟</div>
      <h2 id="milestone-modal-title">Well begun is half done!</h2>
      <p>
        You've completed your first lesson — and that's huge!<br><br>
        You're already at <strong>50%</strong> of your journey.
        Just 50% more to go. Keep the momentum — you've got this! 🚀
      </p>
      <button class="milestone-modal-close" onclick="closeMilestoneModal()">
        Keep Learning →
      </button>
    </div>
  </div>

  <script src="js/modules.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
